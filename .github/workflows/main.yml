name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Allows you to run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Automatically uses repository permissions
          token: ${{ secrets.GITHUB_TOKEN }}

          # Target User Configuration
          user: handlebar-larry
          template: classic
          base: header, activity, community, repositories, metadata
          repositories_forks: yes
          repositories_affiliations: owner, collaborator
          config_display: large
          config_timezone: Asia/Kolkata
          
          # Color Palette Overrides (Swapping Green elements to a Blue spectrum)
          config_theme: classic
          config_order: header, base, languages, notable, active
          
          # Language Graph Layout Configurations
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 15
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used, recently-used
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage, lines
          plugin_languages_indepth: yes

          # Additional Metrics Displays
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Sets the calendar block shades to light-to-dark blues
          plugin_isocalendar_colors: "#e1f5fe, #4fc3f7, #0288d1, #01579b"
          
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_skyline: yes
          plugin_skyline_frames: 100
          plugin_skyline_quality: 0.6
          plugin_skyline_year: current-year
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_stargazers: yes
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: starred
