name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: handlebar-larry
          template: classic
          base: header, activity, community, repositories, metadata
          repositories_forks: yes
          repositories_affiliations: owner, collaborator
          config_display: large
          config_timezone: Asia/Calcutta
          
          # Changes the base to a modern dim-blue palette theme
          config_theme: github-dark-dimmed
          
          # Force the 2D SVG vector engine to override greens with crisp blues
          config_custom_css: |
            .calendar .color-calendar-graph-day-bg { fill: #e1f5fe !important; }
            .calendar .color-calendar-graph-day-L1-bg { fill: #81d4fa !important; }
            .calendar .color-calendar-graph-day-L2-bg { fill: #4fc3f7 !important; }
            .calendar .color-calendar-graph-day-L3-bg { fill: #0288d1 !important; }
            .calendar .color-calendar-graph-day-L4-bg { fill: #01579b !important; }
          
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_introduction: yes
          plugin_introduction_title: yes
          
          # DISABLING ISOMETRIC 3D & ENABLING FLUID 2D CALENDAR
          plugin_isocalendar: no
          plugin_calendar: yes
          plugin_calendar_limit: 1
          
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 15
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_notable: yes
          plugin_notable_from: organization
          
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 28
          plugin_people_types: followers, following
  
          plugin_stars: yes
          plugin_stars_limit: 4
          
          plugin_skyline: yes
          plugin_skyline_frames: 100
          plugin_skyline_quality: 0.6
          plugin_skyline_year: current-year
 
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_stargazers: yes
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: starred
